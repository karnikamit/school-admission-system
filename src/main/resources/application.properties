spring.application.name=school-admission-system
server.port=9999

# Kafka configuration
spring.kafka.bootstrap-servers=localhost:9092
# spring.kafka.consumer.group-id=school-admission-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

#DB configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/amitkumar
spring.datasource.username=amitkumar
spring.datasource.password=

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (optional but typical)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

